name = "api-worker"
main = "src/index.ts"
compatibility_date = "2026-02-14"

[observability]
enabled = true

[observability.logs]
enabled = true

[observability.traces]
enabled = true

[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "api-worker"
database_id = "00000000-0000-0000-0000-000000000000"

[[kv_namespaces]]
binding = "KV_HOT"
# Replaced by CI during deployment
id = "00000000000000000000000000000000"

[assets]
directory = "../ui/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[durable_objects.bindings]]
name = "CHECKIN_SCHEDULER"
class_name = "CheckinScheduler"

[[durable_objects.bindings]]
name = "USAGE_LIMITER"
class_name = "UsageLimiter"

[[durable_objects.bindings]]
name = "CACHE_VERSION_STORE"
class_name = "CacheVersionStore"

[[queues.producers]]
queue = "usage-events"
binding = "USAGE_QUEUE"

[[queues.consumers]]
queue = "usage-events"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CheckinScheduler"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UsageLimiter"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["CacheVersionStore"]



